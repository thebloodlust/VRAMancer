name: Build Rust Core (vramancer_rust)

on:
  push:
    branches:
      - main
      - 'experimental/rust-core'
    tags:
      - 'v*'
  pull_request:
    paths:
      - 'rust_core/**'

jobs:
  lint:
    name: Lint Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Check formatting
        run: cd rust_core && cargo fmt -- --check
      - name: Clippy
        # PyO3 0.20 emits non-local-impl warnings on Rust 1.84+; allow them
        # here since they're upstream macro-generated.
        run: cd rust_core && cargo clippy -- -W warnings -A non_local_definitions

  test:
    name: Test Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run tests
        run: cd rust_core && cargo test

  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    needs: [lint, test]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install maturin
        run: pip install maturin

      - name: Build wheel (Linux/MacOS)
        if: runner.os != 'Windows'
        run: |
          cd rust_core
          maturin build --release
          
      - name: Build wheel (Windows)
        if: runner.os == 'Windows'
        run: |
          cd rust_core
          maturin build --release

      - name: Verify Python import
        if: runner.os == 'Linux'
        run: |
          pip install rust_core/target/wheels/*.whl
          python -c "import vramancer_rust; print(vramancer_rust.__doc__)"

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: rust_core/target/wheels/*.whl

  build-sdist:
    name: Build sdist
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install maturin
        run: pip install maturin
      - name: Build sdist
        run: |
          cd rust_core
          maturin sdist --out target/wheels
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: rust_core/target/wheels/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/vramancer-rust
    permissions:
      id-token: write  # OIDC for trusted publishing
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: List artifacts
        run: ls -la dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
