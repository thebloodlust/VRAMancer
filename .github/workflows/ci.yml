name: VRAMancer CI

on:
  push:
    branches: [ main, master, v7* ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11"]
      fail-fast: false

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-lite.txt || true
        pip install -r requirements.txt || true
        pip install pytest pytest-cov mock aiohttp aiohttp[speedups] pytest-asyncio
        
    - name: Run tests (fast)
      env:
        VRM_MINIMAL_TEST: "1"
        VRM_DISABLE_RATE_LIMIT: "1"
        VRM_TEST_MODE: "1"
      run: |
        pytest tests/ -m "not (slow or integration or chaos)" --no-cov -q

    - name: Run tests (full unfiltered suite, Ubuntu only)
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10'
      env:
        VRM_MINIMAL_TEST: "1"
        VRM_DISABLE_RATE_LIMIT: "1"
        VRM_TEST_MODE: "1"
      run: |
        pytest tests/ --no-cov -q
