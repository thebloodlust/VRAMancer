# config.yaml
# Configuration VRAMancer — dual-GPU heterogeneous (RTX 5070 Ti + RTX 3090)
backend: auto          # auto, huggingface, vllm, ollama
model: gpt2            # modèle par défaut (petit, pour test)
num_gpus: 2            # 2 GPUs passthrough
transfer_method: auto  # auto-détecte P2P ou CPU-staged
dtype: float16         # FP16 — optimal pour inference multi-GPU
