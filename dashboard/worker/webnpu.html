<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VRAMancer — WebNPU Inference</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            background: #0d1117; color: #c9d1d9;
        }
        .header {
            background: #161b22; border-bottom: 1px solid #30363d;
            padding: 12px 20px; display: flex; align-items: center; gap: 16px;
        }
        .header h1 {
            font-size: 16px; color: #58a6ff; font-weight: 600;
        }
        .header .badge {
            background: #238636; color: #fff; padding: 2px 8px;
            border-radius: 12px; font-size: 11px;
        }
        .header .device-badge {
            background: #1f6feb; padding: 2px 10px;
            border-radius: 12px; font-size: 11px; color: #fff;
            transition: background 0.3s;
        }
        .controls {
            padding: 16px 20px; display: flex; gap: 12px;
            align-items: center; flex-wrap: wrap;
            border-bottom: 1px solid #21262d;
        }
        input[type="text"] {
            background: #0d1117; border: 1px solid #30363d;
            color: #c9d1d9; padding: 6px 12px; border-radius: 6px;
            font-family: inherit; font-size: 13px; width: 300px;
        }
        button {
            background: #238636; color: #fff; border: none;
            padding: 6px 16px; border-radius: 6px; cursor: pointer;
            font-family: inherit; font-size: 13px; font-weight: 600;
        }
        button:hover { background: #2ea043; }
        button.stop { background: #da3633; }
        button.stop:hover { background: #f85149; }
        button:disabled { opacity: 0.4; cursor: default; }
        .status-bar {
            background: #161b22; padding: 8px 20px;
            font-size: 12px; display: flex; gap: 24px;
            border-bottom: 1px solid #21262d;
        }
        .status-bar .label { color: #8b949e; }
        .status-bar .value { color: #58a6ff; }
        .status-bar .value.ok { color: #3fb950; }
        .status-bar .value.err { color: #f85149; }
        .main { display: flex; height: calc(100vh - 160px); }
        .panel {
            flex: 1; display: flex; flex-direction: column;
            border-right: 1px solid #21262d;
        }
        .panel:last-child { border-right: none; }
        .panel-title {
            padding: 8px 16px; background: #161b22;
            border-bottom: 1px solid #21262d;
            font-size: 12px; color: #8b949e; text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .output {
            flex: 1; padding: 16px; overflow-y: auto;
            font-size: 14px; line-height: 1.6;
            white-space: pre-wrap; word-wrap: break-word;
        }
        .output .generated { color: #3fb950; }
        .output .prompt { color: #c9d1d9; }
        .log {
            flex: 1; padding: 12px 16px; overflow-y: auto;
            font-size: 11px; line-height: 1.5;
        }
        .log .entry { padding: 1px 0; }
        .log .ts { color: #484f58; }
        .log .upload { color: #d2a8ff; }
        .log .compute { color: #79c0ff; }
        .log .init, .log .ready, .log .config { color: #3fb950; }
        .log .error { color: #f85149; }
        .log .connected { color: #3fb950; font-weight: bold; }
        .progress {
            height: 3px; background: #21262d;
        }
        .progress-bar {
            height: 100%; background: #58a6ff;
            transition: width 0.3s;
            width: 0%;
        }
        .device-info {
            background: #161b22; padding: 8px 20px;
            font-size: 11px; border-bottom: 1px solid #21262d;
            color: #8b949e;
        }
        .device-info .chip {
            display: inline-block; padding: 1px 8px; margin: 0 4px;
            border-radius: 8px; font-size: 10px;
        }
        .chip.npu { background: #238636; color: #fff; }
        .chip.gpu { background: #1f6feb; color: #fff; }
        .chip.cpu { background: #6e7681; color: #fff; }
        .chip.fallback { background: #d29922; color: #fff; }
        .chip.none { background: #da3633; color: #fff; }
    </style>
</head>
<body>
    <div class="header">
        <h1>VRAMancer</h1>
        <span class="badge" id="badge">WebNPU</span>
        <span class="device-badge" id="deviceBadge">Detecting...</span>
    </div>

    <div class="device-info" id="deviceInfo">
        Accelerator: detecting available backends...
    </div>

    <div class="controls">
        <input type="text" id="wsUrl" value="wss://localhost:8765" placeholder="WebSocket URL">
        <button id="btnConnect" onclick="doConnect()">Connect</button>
        <button id="btnStop" class="stop" onclick="doStop()" disabled>Stop</button>
    </div>

    <div class="status-bar">
        <span><span class="label">Status: </span><span class="value" id="stStatus">Disconnected</span></span>
        <span><span class="label">Backend: </span><span class="value" id="stBackend">—</span></span>
        <span><span class="label">Weights: </span><span class="value" id="stWeights">0</span></span>
        <span><span class="label">VRAM: </span><span class="value" id="stVRAM">—</span></span>
        <span><span class="label">Tok/s: </span><span class="value" id="stTPS">—</span></span>
    </div>

    <div class="progress"><div class="progress-bar" id="progressBar"></div></div>

    <div class="main">
        <div class="panel" style="flex: 2;">
            <div class="panel-title">Generated Text</div>
            <div class="output" id="textOutput"></div>
        </div>
        <div class="panel">
            <div class="panel-title">Log</div>
            <div class="log" id="logOutput"></div>
        </div>
    </div>

    <script>
        // ====== Detect best backend and load appropriate worker ======
        let workerType = "none";

        (async function detectAndLoad() {
            const badge = document.getElementById("deviceBadge");
            const badgeMain = document.getElementById("badge");
            const info = document.getElementById("deviceInfo");
            const backendEl = document.getElementById("stBackend");

            const caps = { webnn_npu: false, webnn_gpu: false, webnn_cpu: false, webgpu: false };

            // Probe WebNN device types
            if (navigator.ml) {
                for (const dt of ["npu", "gpu", "cpu"]) {
                    try {
                        const ctx = await navigator.ml.createContext({ deviceType: dt });
                        caps["webnn_" + dt] = true;
                        if (ctx.destroy) ctx.destroy();
                    } catch {}
                }
            }

            // Probe WebGPU
            if (navigator.gpu) {
                try {
                    const adapter = await navigator.gpu.requestAdapter();
                    if (adapter) caps.webgpu = true;
                } catch {}
            }

            // Build capability display
            const chips = [];
            if (caps.webnn_npu) chips.push('<span class="chip npu">NPU</span>');
            if (caps.webnn_gpu) chips.push('<span class="chip gpu">WebNN-GPU</span>');
            if (caps.webnn_cpu) chips.push('<span class="chip cpu">WebNN-CPU</span>');
            if (caps.webgpu) chips.push('<span class="chip fallback">WebGPU</span>');
            if (chips.length === 0) chips.push('<span class="chip none">None</span>');
            info.innerHTML = "Available: " + chips.join(" ");

            // Choose best backend and load worker
            let scriptSrc;

            if (caps.webnn_npu || caps.webnn_gpu || caps.webnn_cpu) {
                // WebNN available — load WebNPU worker
                scriptSrc = "inference_worker_webnn.js";
                workerType = "webnn";

                if (caps.webnn_npu) {
                    badge.textContent = "NPU";
                    badge.style.background = "#238636";
                    backendEl.textContent = "WebNN → NPU";
                } else if (caps.webnn_gpu) {
                    badge.textContent = "GPU (WebNN)";
                    badge.style.background = "#1f6feb";
                    backendEl.textContent = "WebNN → GPU";
                } else {
                    badge.textContent = "CPU (WebNN)";
                    badge.style.background = "#6e7681";
                    backendEl.textContent = "WebNN → CPU";
                }
            } else if (caps.webgpu) {
                // Fallback to WebGPU
                scriptSrc = "inference_worker_gpu.js";
                workerType = "webgpu";
                badge.textContent = "WebGPU Fallback";
                badge.style.background = "#d29922";
                badgeMain.textContent = "WebGPU";
                backendEl.textContent = "WebGPU (fallback)";
            } else {
                badge.textContent = "No Accelerator";
                badge.style.background = "#da3633";
                backendEl.textContent = "Unavailable";
                return;
            }

            // Dynamically load the chosen worker script
            const script = document.createElement("script");
            script.src = scriptSrc;
            script.onload = () => log("init", `Loaded ${scriptSrc} (${workerType})`);
            script.onerror = () => log("error", `Failed to load ${scriptSrc}`);
            document.head.appendChild(script);
        })();

        // ====== Auto-detect WSS URL ======
        (function() {
            const proto = location.protocol === "https:" ? "wss" : "ws";
            const host = location.host;
            document.getElementById("wsUrl").value = `${proto}://${host}`;
        })();

        // ====== UI Logic (same as inference.html) ======
        let worker = null;

        function log(cls, msg) {
            const el = document.getElementById("logOutput");
            const ts = new Date().toLocaleTimeString();
            el.innerHTML += `<div class="entry"><span class="ts">${ts}</span> <span class="${cls}">${msg}</span></div>`;
            el.scrollTop = el.scrollHeight;
        }

        function setStatus(text, cls) {
            const el = document.getElementById("stStatus");
            el.textContent = text;
            el.className = "value" + (cls ? " " + cls : "");
        }

        window.addEventListener("vramancer-status", (e) => {
            const { status, message } = e.detail;
            log(status, message);

            if (status === "connected") setStatus("Connected", "ok");
            else if (status === "ready") setStatus("Ready", "ok");
            else if (status === "error") setStatus(message, "err");
            else if (status === "upload") {
                const match = message.match(/total: (\d+) MB/);
                if (match) document.getElementById("stVRAM").textContent = match[1] + " MB";
                const stats = worker ? worker.getStats() : null;
                if (stats) {
                    document.getElementById("stWeights").textContent = stats.weights;
                    if (stats.backend) {
                        document.getElementById("stBackend").textContent = stats.backend;
                    }
                }
            }
            else if (status === "compute") {
                const tpsMatch = message.match(/([\d.]+) tok\/s/);
                if (tpsMatch) document.getElementById("stTPS").textContent = tpsMatch[1] + " tok/s";
            }
        });

        async function doConnect() {
            const url = document.getElementById("wsUrl").value;
            document.getElementById("btnConnect").disabled = true;
            document.getElementById("btnStop").disabled = false;
            document.getElementById("textOutput").innerHTML = "";

            try {
                worker = await VRAMancerInference.connectAndServe(url);
            } catch (e) {
                log("error", e.message);
                setStatus("Failed", "err");
                document.getElementById("btnConnect").disabled = false;
                document.getElementById("btnStop").disabled = true;
            }
        }

        function doStop() {
            if (worker) { worker.stop(); worker = null; }
            setStatus("Disconnected");
            document.getElementById("btnConnect").disabled = false;
            document.getElementById("btnStop").disabled = true;
        }
    </script>
</body>
</html>
