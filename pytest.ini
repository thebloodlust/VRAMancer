[pytest]
addopts = -q --cov=core --cov-report=term-missing --cov-fail-under=65
markers =
    slow: tests lents ou gourmands
    integration: tests d'intégration
    network: tests réseau
    smoke: sous-ensemble rapide (sanity de base)
    gpu: nécessite un GPU réel (CUDA/ROCm/MPS)
    real_torch: nécessite torch réel (CPU suffit)
    heavy: tests très gourmands en ressources